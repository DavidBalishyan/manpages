<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manpage Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Manual Pages</h1>
        <input type="text" id="searchBar" placeholder="Search commands (e.g. 'grep' or 'printf')..." autofocus>
    </header>

    <main id="container">
        <div id="loading">Loading manual index...</div>
        </main>

    <script>
        const container = document.getElementById('container');
        const searchBar = document.getElementById('searchBar');
        let manpages = [];

        // Load the manifest generated by your Bash script
        fetch('man/manifest.json')
            .then(res => res.json())
            .then(data => {
                manpages = data;
                renderLinks(manpages);
            });

        function renderLinks(list) {
            if (list.length === 0) {
                container.innerHTML = '<p>No matching manpages found.</p>';
                return;
            }

            // Group by section
            const sections = list.reduce((acc, page) => {
                acc[page.section] = acc[page.section] || [];
                acc[page.section].push(page);
                return acc;
            }, {});

            container.innerHTML = '';
            Object.keys(sections).sort().forEach(sec => {
                const secDiv = document.createElement('section');
                secDiv.innerHTML = `<h2>Section ${sec}</h2><ul></ul>`;
                const ul = secDiv.querySelector('ul');
                
                sections[sec].forEach(page => {
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="${page.path}">${page.name}(${page.section})</a>`;
                    ul.appendChild(li);
                });
                container.appendChild(secDiv);
            });
        }

        searchBar.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = manpages.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.section.includes(term)
            );
            renderLinks(filtered);
        });
    </script>
</body>
</html>
